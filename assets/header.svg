<svg viewBox="0 0 854 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pinyi — Frontend Engineer">
  <style>
    .text { font-size: 42px; font-weight: 700; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Helvetica,Arial,sans-serif; }
    .desc { font-size: 18px; font-weight: 500; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Helvetica,Arial,sans-serif; }
    .text, .desc { animation: twinkling 4s ease-in-out infinite; }
    @keyframes twinkling { 40% { opacity: 1; } 50% { opacity: .5; } 60% { opacity: 1; } 70% { opacity: .5; } 80% { opacity: 1; } }
  </style>
  <defs>
    <linearGradient id="linear" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003d29"/>
      <stop offset="50%" stop-color="#00DC82"/>
      <stop offset="100%" stop-color="#00b368"/>
    </linearGradient>
  </defs>

  <!-- 固定底色：深淺模式下完全一致。想墊白色改 #ffffff -->
  <rect width="854" height="260" fill="#0d1117"/>

  <!-- 兩層半透明波浪原地變形、相位差半週期交錯（capsule-render 原版動畫，等比拉高至 260） -->
  <g transform="scale(1,1.1818)">
    <path fill="url(#linear)" opacity="0.4">
      <animate attributeName="d" dur="32s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1"
        values="M0 0L 0 140Q 213.5 180 427 150T 854 175L 854 0 Z;M0 0L 0 165Q 213.5 180 427 160T 854 150L 854 0 Z;M0 0L 0 185Q 213.5 155 427 185T 854 150L 854 0 Z;M0 0L 0 140Q 213.5 180 427 150T 854 175L 854 0 Z"/>
    </path>
    <path fill="url(#linear)" opacity="0.4">
      <animate attributeName="d" dur="32s" repeatCount="indefinite" keyTimes="0;0.333;0.667;1" begin="-16s"
        values="M0 0L 0 155Q 213.5 200 427 170T 854 180L 854 0 Z;M0 0L 0 170Q 213.5 140 427 140T 854 160L 854 0 Z;M0 0L 0 165Q 213.5 145 427 170T 854 185L 854 0 Z;M0 0L 0 155Q 213.5 200 427 170T 854 180L 854 0 Z"/>
    </path>
  </g>

  <text text-anchor="middle" dominant-baseline="middle" x="50%" y="78" class="text" fill="#fff">Pinyi</text>
  <text text-anchor="middle" dominant-baseline="middle" x="50%" y="128" class="desc" fill="#fff">Frontend Engineer · Nuxt · SDD × AI-Native Workflow</text>
</svg>
